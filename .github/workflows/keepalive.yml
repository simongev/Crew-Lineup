name: Keep Alive

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Re-enable Flight Monitor
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow enable "Flight Monitor"
